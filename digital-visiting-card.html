<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sheikh Consultant Card</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #e9ecef;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      padding: 10px;
    }

    .card {
      width: min(360px, calc(100vw - 20px));
      height: min(760px, calc(100dvh - 20px));
      padding: 12px 10px 12px;
      background:
        radial-gradient(circle at 20% 12%, rgba(23, 166, 90, 0.2), transparent 38%),
        radial-gradient(circle at 82% 58%, rgba(117, 121, 128, 0.35), transparent 50%),
        linear-gradient(165deg, #0d6b3f 0%, #095834 35%, #0b3f2a 100%);
      border-radius: 2px;
      position: relative;
      overflow: hidden;
      display: flex;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(255, 255, 255, 0.06) 0%, transparent 42%),
        radial-gradient(circle at 15% 85%, rgba(128, 133, 140, 0.24), transparent 46%);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    .logo {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      margin: 0 auto 12px;
      border: 3px solid rgba(18, 136, 73, 0.7);
      background: #ffffff;
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.24), inset 0 0 0 2px rgba(17, 136, 72, 0.08);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      padding: 7px;
      background: #fff;
    }

    .title {
      text-align: center;
      font-size: clamp(34px, 10vw, 58px);
      font-weight: 700;
      letter-spacing: 0.15px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.35);
      line-height: 1.04;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: clamp(14px, 4.2vw, 17px);
      color: #e4ece6;
      font-weight: 400;
      line-height: 1.25;
      margin-bottom: 14px;
    }

    .button {
      height: clamp(48px, 13vw, 56px);
      border-radius: 8px;
      text-decoration: none;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: clamp(19px, 6vw, 22px);
      font-weight: 700;
      margin-bottom: 10px;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.34);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .button svg {
      width: clamp(24px, 6.8vw, 30px);
      height: clamp(24px, 6.8vw, 30px);
      fill: currentColor;
      flex-shrink: 0;
    }

    .button.call,
    .button.wa {
      background: linear-gradient(180deg, #1fc55d 0%, #0b9441 100%);
    }

    .services-title {
      margin: 8px 0 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #ffffff;
      font-size: clamp(24px, 7vw, 30px);
      font-weight: 700;
      justify-content: center;
    }

    .services-title::before,
    .services-title::after {
      content: "";
      height: 1px;
      background: linear-gradient(to right, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0));
      flex: 1;
    }

    .services {
      border-radius: 13px;
      background: linear-gradient(180deg, rgba(17, 87, 55, 0.95), rgba(12, 64, 41, 0.96));
      border: 1px solid rgba(195, 206, 198, 0.38);
      box-shadow: 0 3px 9px rgba(0, 0, 0, 0.36);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3px;
      padding: 10px 4px 8px;
      margin-bottom: 14px;
    }

    .service-item {
      text-align: center;
      color: #fff;
    }

    .service-item svg {
      width: 28px;
      height: 28px;
      fill: #f4f7fc;
      margin-bottom: 5px;
      filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.35));
    }

    .service-item p {
      font-size: clamp(10px, 2.9vw, 12px);
      line-height: 1.12;
      color: #f7fbff;
      font-weight: 600;
    }

    .next-btn {
      margin-top: auto;
      margin-bottom: 8px;
      height: clamp(46px, 12vw, 52px);
      border-radius: 8px;
      text-decoration: none;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: clamp(18px, 5.8vw, 22px);
      font-weight: 700;
      background: linear-gradient(180deg, #1b1f24 0%, #0f1216 100%);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.35);
    }

    .next-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    @media (max-width: 420px) {
      body {
        padding: 6px;
      }

      .card {
        width: 100%;
        height: calc(100dvh - 12px);
        padding: 10px 8px 10px;
      }

      .services {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px 6px;
        padding: 10px 8px;
      }

      .service-item svg {
        margin-bottom: 4px;
      }

    }

    @media (min-width: 421px) and (max-width: 768px) {
      .card {
        width: min(420px, calc(100vw - 24px));
      }
    }

  </style>
</head>
<body>
  <section class="card">
    <div class="content">
      <div class="logo">
        <img src="./image.png" alt="Company Logo">
      </div>

      <h1 class="title">GREEN LAND</h1>
      <p class="subtitle">REAL ESTATE &amp; MARKETING</p>

      <a class="button call" href="tel:+923363678808">
        <svg viewBox="0 0 24 24" aria-hidden="true">

        </svg>
        <span>Call Now</span>
      </a>

      <a class="button wa" href="https://wa.me/923363678808" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M20.5 3.5A11.3 11.3 0 0 0 12.4 0C6.1 0 .9 5.2.9 11.5c0 2 .5 3.9 1.5 5.7L0 24l7-2.3c1.7.9 3.5 1.3 5.4 1.3h.1c6.3 0 11.5-5.2 11.5-11.5 0-3.1-1.2-6-3.5-8Zm-8.1 17.5h-.1c-1.6 0-3.2-.4-4.6-1.2l-.3-.2-4.2 1.4 1.4-4.1-.2-.4a9.2 9.2 0 0 1 8-13.9c5.1 0 9.3 4.2 9.3 9.3S17.5 21 12.4 21Zm5.1-6.9c-.3-.1-1.8-.9-2.1-1s-.5-.1-.7.1-.8 1-1 1.1c-.2.1-.4.2-.7 0a7.7 7.7 0 0 1-2.2-1.4 8.6 8.6 0 0 1-1.6-2c-.2-.4 0-.5.2-.7l.5-.5c.2-.2.3-.3.4-.5.1-.2 0-.4 0-.6 0-.1-.7-1.7-.9-2.3-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.6.1-.9.4-.3.4-1.2 1.1-1.2 2.8s1.2 3.2 1.4 3.4c.2.2 2.3 3.5 5.5 4.9.8.3 1.5.5 2 .7.9.3 1.7.2 2.4.1.7-.1 1.8-.7 2-1.4.3-.7.3-1.4.2-1.5-.2-.2-.4-.3-.7-.4Z"/>
        </svg>
        <span>WhatsApp</span>
      </a>

      <h2 class="services-title">Our Services</h2>

      <div class="services">
        <div class="service-item">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 4h18v12H3V4Zm2 2v8h14V6H5Zm-2 12h18v2H3v-2Zm7-9h4v2h-4V9Z"/>
          </svg>
          <p>Property Buying</p>
        </div>

        <div class="service-item">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 3h10v3h2a2 2 0 0 1 2 2v10H3V8a2 2 0 0 1 2-2h2V3Zm2 3h6V5H9v1Zm-4 4v6h14v-6H5Zm4 1h6v2H9v-2Z"/>
          </svg>
          <p>Property Selling</p>
        </div>

        <div class="service-item">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2 9.5 12 4l10 5.5v2L12 17 2 11.5v-2Zm10-3.2L5.6 9.5 12 12.7l6.4-3.2L12 6.3ZM4 13l8 4.4 8-4.4v2L12 20l-8-5v-2Z"/>
          </svg>
          <p>Rent &amp; Leasing</p>
        </div>

        <div class="service-item">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2a7 7 0 0 0-7 7c0 5.2 7 13 7 13s7-7.8 7-13a7 7 0 0 0-7-7Zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5Z"/>
          </svg>
          <p>File &amp; Plot Management</p>
        </div>
      </div>

      <a class="next-btn" href="./real-estate-info.html">
        <span>Next</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m13.2 4.8 1.4-1.4L23.2 12l-8.6 8.6-1.4-1.4 6.2-6.2H1v-2h18.4l-6.2-6.2Z"/>
        </svg>
      </a>
    </div>
  </section>
</body>
</html>
